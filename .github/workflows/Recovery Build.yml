name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      device_tree_url:
        description: "Device tree repository URL (GitHub or GitLab)"
        required: true
        type: string
        default: ""

      device_tree_branch:
        description: "Device tree branch"
        required: true
        type: string
        default: ""

      device_path:
        description: "Device path (ex: device/xiaomi/zorn)"
        required: true
        type: string
        default: ""

      device_name:
        description: "Device codename (ex: zorn)"
        required: true
        type: string
        default: ""

      makefile_name:
        description: "Makefile name (ex: twrp_zorn)"
        required: true
        type: string
        default: ""

      build_target:
        description: "Build target"
        required: true
        type: choice
        default: recovery
        options:
          - recovery
          - boot
          - vendorboot

      dt_token:
        description: "Personal Access Token (leave empty for public repos)"
        required: false
        type: string
        default: ""

      telegram_bot_token:
        description: "Telegram Bot Token (leave empty to disable)"
        required: false
        type: string
        default: ""

      telegram_chat_id:
        description: "Telegram Chat ID (leave empty to disable)"
        required: false
        type: string
        default: ""

      create_release:
        description: "Create public GitHub Release?"
        required: true
        type: choice
        default: "No — Artifacts only (private)"
        options:
          - "Yes — Create Release (public)"
          - "No — Artifacts only (private)"

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: write

    env:
      SYNC_URL: https://github.com/OrangeFox16/sync.git
      MANIFEST_BRANCH: "16.0"
      DEVICE_TREE_URL: ${{ inputs.device_tree_url }}
      DEVICE_TREE_BRANCH: ${{ inputs.device_tree_branch }}
      DEVICE_PATH: ${{ inputs.device_path }}
      DEVICE_NAME: ${{ inputs.device_name }}
      MAKEFILE_NAME: ${{ inputs.makefile_name }}
      BUILD_TARGET: ${{ inputs.build_target }}
      DT_TOKEN: ${{ inputs.dt_token }}
      TG_BOT_TOKEN: ${{ inputs.telegram_bot_token }}
      TG_CHAT_ID: ${{ inputs.telegram_chat_id }}
      CREATE_RELEASE: ${{ inputs.create_release }}
      WATCH_UNTIL_SECONDS: 20700
      WATCH_INTERVAL_SECONDS: 600

    steps:
    
    - name: "TEST: Verify device tree access FIRST"
      run: |
        DT_URL="${{ env.DEVICE_TREE_URL }}"
        ORIGINAL_URL="$DT_URL"
        TOKEN="${{ env.DT_TOKEN }}"
        
        echo "=============================================="
        echo " Testing device tree access..."
        echo " URL    : $DT_URL"
        echo " Branch : ${{ env.DEVICE_TREE_BRANCH }}"
        echo "=============================================="
        
        if [ -n "$TOKEN" ]; then
          if echo "$DT_URL" | grep -q "github.com"; then
            DT_URL=$(echo "$DT_URL" | sed "s|https://github.com/|https://oauth2:${TOKEN}@github.com/|")
            echo "🔑 Using provided token for GitHub"
          elif echo "$DT_URL" | grep -q "gitlab.com"; then
            DT_URL=$(echo "$DT_URL" | sed "s|https://gitlab.com/|https://oauth2:${TOKEN}@gitlab.com/|")
            echo "🔑 Using provided token for GitLab"
          fi
        else
          echo "ℹ️  No token provided — trying public access"
        fi
        
        echo "AUTH_URL=$DT_URL" >> $GITHUB_ENV
        echo "ORIGINAL_URL=$ORIGINAL_URL" >> $GITHUB_ENV
        
        if git ls-remote --exit-code "$DT_URL" 2>/dev/null; then
          echo "✅ Device tree accessible! Continuing build..."
        else
          echo "❌ FATAL: Cannot access device tree."
          echo "   Check: URL, branch name, or token validity."
          exit 1
        fi

    - name: Setup Telegram notifications
      run: |
        if [ -n "${{ env.TG_BOT_TOKEN }}" ] && [ -n "${{ env.TG_CHAT_ID }}" ]; then
          cat <<'EOF' > /tmp/send_msg.sh
        #!/bin/bash
        MSG="$(printf "$1")"
        curl -s --fail \
          -X POST "https://api.telegram.org/bot${{ env.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ env.TG_CHAT_ID }}" \
          -d text="$MSG" \
          -d parse_mode="Markdown" \
          -d disable_web_page_preview=true \
        > /dev/null 2>&1 || true
        EOF
          chmod +x /tmp/send_msg.sh
          echo "TELEGRAM_ENABLED=true" >> $GITHUB_ENV
        else
          echo '#!/bin/bash' > /tmp/send_msg.sh
          echo 'exit 0' >> /tmp/send_msg.sh
          chmod +x /tmp/send_msg.sh
          echo "TELEGRAM_ENABLED=false" >> $GITHUB_ENV
        fi

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      run: |
        /tmp/send_msg.sh "🚀 *Starting OrangeFox build* for \`${{ env.DEVICE_NAME }}\` (\`${{ env.MANIFEST_BRANCH }}\`)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        /tmp/send_msg.sh "🧩 Preparing build environment..."
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            git python3 tar aria2
        curl -L -O "https://gitlab.com/OrangeFox/misc/scripts/-/raw/master/setup/android_build_env.sh"
        sudo bash android_build_env.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        /tmp/send_msg.sh "🌐 Syncing OrangeFox sources..."
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone --depth=1 ${{ env.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Replace vendor/recovery with latest
      run: |
        /tmp/send_msg.sh "🔁 Updating vendor/recovery..."
        cd "${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}"
        rm -rf vendor/recovery
        git clone --depth=1 -b fox_16.0-R12 \
          https://gitlab.com/OrangeFox/vendor/recovery.git \
          vendor/recovery
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        /tmp/send_msg.sh "🌲 Cloning device tree for \`${{ env.DEVICE_NAME }}\`..."
        cd "${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}"
        git clone --depth=1 "${{ env.AUTH_URL }}" -b "${{ env.DEVICE_TREE_BRANCH }}" "./${{ env.DEVICE_PATH }}"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Get latest device tree commit
      id: devtree_commit
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/${{ env.DEVICE_PATH }}
        LATEST_COMMIT=$(git rev-parse --short=7 HEAD)
        LATEST_COMMIT_FULL=$(git rev-parse HEAD)
        echo "LATEST_COMMIT=$LATEST_COMMIT" >> $GITHUB_OUTPUT
        echo "LATEST_COMMIT_FULL=$LATEST_COMMIT_FULL" >> $GITHUB_OUTPUT
        echo "Latest device tree commit: $LATEST_COMMIT"
        DISPLAY_URL=$(echo "${{ env.ORIGINAL_URL }}" | sed 's|https://oauth2:[^@]*@|https://|')
        /tmp/send_msg.sh "🌲 Device tree: [${LATEST_COMMIT}](${DISPLAY_URL}/tree/$LATEST_COMMIT)"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 40

    - name: Show system resources
      run: |
        /tmp/send_msg.sh "📊 Checking runner resources..."
        echo "CPU cores:"
        nproc
        echo
        echo "Memory:"
        free -h
        echo
        echo "Disk:"
        df -h
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery
      run: |
        /tmp/send_msg.sh "⚙️ Starting build for \`${{ env.DEVICE_NAME }}\`..."
        cd "${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}"
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        lunch ${{ env.MAKEFILE_NAME }}-bp2a-eng
        if ! mka adbd ${{ env.BUILD_TARGET }}image -j$(nproc --all); then
          /tmp/send_msg.sh "❌ Build failed for \`${{ env.DEVICE_NAME }}\` (\`${{ env.MANIFEST_BRANCH }}\`)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          exit 1
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Notify Build Failure
      if: failure()
      run: |
        /tmp/send_msg.sh "❌ Build failed for \`${{ env.DEVICE_NAME }}\` (\`${{ env.MANIFEST_BRANCH }}\`)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        exit 1

    - name: Show system resources post-build
      run: |
        /tmp/send_msg.sh "📊 Post-build runner resources..."
        echo "CPU cores:"
        nproc
        echo
        echo "Memory:"
        free -h
        echo
        echo "Disk:"
        df -h
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check output directory
      run: |
        echo "Output files:"
        ls -la "${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/"

    - name: Upload to Release
      if: ${{ env.CREATE_RELEASE == 'Yes — Create Release (public)' }}
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox-R*.zip
        name: ${{ env.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ env.MANIFEST_BRANCH }}
          Device: ${{ env.DEVICE_NAME }}
          Target: ${{ env.BUILD_TARGET }}
          Device tree commit: [${{ steps.devtree_commit.outputs.LATEST_COMMIT }}](${{ env.ORIGINAL_URL }}/tree/${{ steps.devtree_commit.outputs.LATEST_COMMIT }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Release
      if: ${{ env.CREATE_RELEASE == 'Yes — Create Release (public)' }}
      run: |
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }}"
        /tmp/send_msg.sh "📦 *Build complete!*\n🔗 [Download]($RELEASE_URL)"

    - name: Upload as Artifact (private)
      if: ${{ env.CREATE_RELEASE != 'Yes — Create Release (public)' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DEVICE_NAME }}-recovery
        path: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox-R*.zip
        retention-days: 90

    - name: Notify Build Complete
      if: success()
      run: |
        if [ "${{ env.CREATE_RELEASE }}" = "Yes — Create Release (public)" ]; then
          /tmp/send_msg.sh "📦 *Build complete!* Check the Release tab."
        else
          /tmp/send_msg.sh "📦 *Build complete!* Artifact available in Actions tab (private, expires in 90 days)."
        fi

    - name: Watch for device tree changes and dirty build
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        START_TIME=$(date +%s)
        BUILD_COUNT=0
        CURRENT_COMMIT="${{ steps.devtree_commit.outputs.LATEST_COMMIT_FULL }}"
        WORKSPACE="${{ steps.pwd.outputs.workspace-folder }}"
        FOX_DIR="$WORKSPACE/fox_${{ env.MANIFEST_BRANCH }}"
        DEVICE_DIR="$FOX_DIR/${{ env.DEVICE_PATH }}"
        OUT_DIR="$FOX_DIR/out/target/product/${{ env.DEVICE_NAME }}"
        /tmp/send_msg.sh "👀 Watching for device tree changes until the watch window ends..."
        while true; do
          NOW=$(date +%s)
          ELAPSED=$((NOW - START_TIME))
          if [ "$ELAPSED" -ge "${{ env.WATCH_UNTIL_SECONDS }}" ]; then
            /tmp/send_msg.sh "⏱️ Watch window ended. No more dirty builds will be attempted."
            break
          fi
          sleep "${{ env.WATCH_INTERVAL_SECONDS }}"
          NOW=$(date +%s)
          ELAPSED=$((NOW - START_TIME))
          if [ "$ELAPSED" -ge "${{ env.WATCH_UNTIL_SECONDS }}" ]; then
            break
          fi
          cd "$DEVICE_DIR"
          git fetch origin "${{ env.DEVICE_TREE_BRANCH }}"
          NEW_COMMIT=$(git rev-parse "origin/${{ env.DEVICE_TREE_BRANCH }}")
          NEW_COMMIT_SHORT=$(echo "$NEW_COMMIT" | cut -c1-7)
          CURRENT_COMMIT_SHORT=$(echo "$CURRENT_COMMIT" | cut -c1-7)
          if [ "$NEW_COMMIT" = "$CURRENT_COMMIT" ]; then
            echo "No device tree change detected. Current commit: $CURRENT_COMMIT_SHORT"
            continue
          fi
          BUILD_COUNT=$((BUILD_COUNT + 1))
          /tmp/send_msg.sh "🆕 Device tree change detected: \`${CURRENT_COMMIT_SHORT}\` → \`${NEW_COMMIT_SHORT}\`\n🔄 Updating device tree and vendor/recovery, then starting dirty build #${BUILD_COUNT}..."
          git reset --hard "$NEW_COMMIT"
          CURRENT_COMMIT="$NEW_COMMIT"
          cd "$FOX_DIR"
          rm -rf vendor/recovery
          git clone --depth=1 -b fox_16.0-R12 \
            https://gitlab.com/OrangeFox/vendor/recovery.git \
            vendor/recovery
          set +e
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          set -e
          lunch ${{ env.MAKEFILE_NAME }}-bp2a-eng
          /tmp/send_msg.sh "🔨 Dirty build #${BUILD_COUNT} compilation started..."
          if ! mka adbd ${{ env.BUILD_TARGET }}image -j$(nproc --all); then
            /tmp/send_msg.sh "❌ Dirty build #${BUILD_COUNT} failed at commit \`${NEW_COMMIT_SHORT}\`. I will keep watching for another device tree change."
            continue
          fi
          TAG_NAME="${{ github.run_id }}-${BUILD_COUNT}"
          RELEASE_NAME="${{ env.DEVICE_NAME }}-${TAG_NAME}"
          /tmp/send_msg.sh "📦 Uploading dirty build #${BUILD_COUNT}..."
          gh release create "$TAG_NAME" \
            "$OUT_DIR/recovery.img" \
            "$OUT_DIR"/OrangeFox-R*.zip \
            --title "$RELEASE_NAME" \
            --notes "Manifest: ${{ env.MANIFEST_BRANCH }}
        Device: ${{ env.DEVICE_NAME }}
        Target: ${{ env.BUILD_TARGET }}
        Dirty build: #${BUILD_COUNT}
        Device tree commit: ${NEW_COMMIT_SHORT}
        Device tree URL: ${{ env.ORIGINAL_URL }}/tree/${NEW_COMMIT_SHORT}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          /tmp/send_msg.sh "📦 *Dirty build #${BUILD_COUNT} complete!*\n🔗 [Download]($RELEASE_URL)\n🌲 Device tree commit: [${NEW_COMMIT_SHORT}](${{ env.ORIGINAL_URL }}/tree/${NEW_COMMIT_SHORT})"
        done
